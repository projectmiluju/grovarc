global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical-receiver
      repeat_interval: 1h

receivers:
  - name: default
    # 추후 Slack / 이메일 설정 추가

  - name: critical-receiver
    # 추후 PagerDuty / Slack 크리티컬 채널 설정 추가

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
