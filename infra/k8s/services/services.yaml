apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: grovarc
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: grovarc
spec:
  selector:
    app: ai
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: grovarc
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-service
  namespace: grovarc
spec:
  selector:
    app: mcp
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
