apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
  namespace: grovarc
  labels:
    app: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
        - name: mcp
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/grovarc-mcp:latest
          ports:
            - containerPort: 3001
          env:
            - name: API_URL
              value: "http://api-service:8080"
          envFrom:
            - secretRef:
                name: grovarc-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
